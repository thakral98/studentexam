version: '3.9'
# Simplified compose file for LOCAL TESTING ONLY — no Nginx/TLS/monitoring.
# Exposes backend and frontend directly on host ports. Use docker-compose.yml
# (the full stack) for anything resembling production.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: student_portal
      POSTGRES_USER: portal_admin
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portal_admin']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - '4000:4000'
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
